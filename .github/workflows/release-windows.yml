name: Release Windows desktop

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the Windows installer to
        required: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run desktop:win
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.release.name || github.event.inputs.tag || github.ref_name }}
          files: release/Nostr-Social-Windows-x64.exe
