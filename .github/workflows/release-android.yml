name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the APK to
        required: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run icons
      - run: npm run build
      - run: npx cap add android
      - run: npm run icons
      - run: npx cap sync android
      - run: ./gradlew assembleDebug
        working-directory: android
      - run: mkdir -p release && cp android/app/build/outputs/apk/debug/app-debug.apk release/Nostr-Social-Android.apk
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.release.name || github.event.inputs.tag || github.ref_name }}
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
          files: release/Nostr-Social-Android.apk
