<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <script>
      try {
        const base = '%sveltekit.assets%';
        const embedded = location.pathname.startsWith(`${base}/embed/`);
        const native = window.Capacitor?.isNativePlatform?.();
        const theme = embedded ? 'dark' : localStorage.getItem('nostr-theme');
        const resolvedTheme = theme === 'dark' ? 'dark' : 'light';
        document.documentElement.dataset.theme = resolvedTheme;
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', resolvedTheme === 'dark' ? '#0f172a' : '#fffdf8');
        if (native) document.documentElement.classList.add('native-shell');
        if (!embedded && theme !== 'dark' && theme !== 'light') localStorage.setItem('nostr-theme', 'light');
      } catch {
        document.documentElement.dataset.theme = 'light';
      }
    </script>
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="icon" href="%sveltekit.assets%/icon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
